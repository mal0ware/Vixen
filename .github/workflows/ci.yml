# CI: lint (ruff, blocking), type check (mypy, advisory), full pytest suite
# against real Postgres 16 + Redis 7 service containers.
#
# The test suite talks to real databases by design (see tests/conftest.py):
# BigInteger columns, ON DELETE CASCADE, and TRUNCATE ... RESTART IDENTITY
# semantics that SQLite fakes or breaks. Host-port mappings (5433 / 6380)
# mirror docker-compose.yml so the conftest defaults work unchanged; the
# TEST_* env vars are still set explicitly to keep the wiring obvious.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned to the version the codebase was zeroed against; bump
      # deliberately, not implicitly, so rule additions don't break CI.
      - run: pip install ruff==0.15.12
      - run: ruff check .

  typecheck:
    # Advisory only: 63 pre-existing mypy errors, almost all discord.py
    # decorator typing (hybrid_command / app_commands generics). Kept
    # visible here so the count can be burned down over time without
    # blocking merges. Flip continue-on-error off once it reaches zero.
    name: mypy (advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: mypy src cogs

  test:
    name: pytest (Postgres 16 + Redis 7)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vixen
          POSTGRES_PASSWORD: vixen
          POSTGRES_DB: vixen
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U vixen -d vixen"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      TEST_BOOTSTRAP_URL: postgresql+asyncpg://vixen:vixen@localhost:5433/vixen
      TEST_DATABASE_URL: postgresql+asyncpg://vixen:vixen@localhost:5433/vixen_test
      TEST_REDIS_URL: redis://localhost:6380/1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: pytest -v
