[alembic]
script_location = alembic

# We override sqlalchemy.url in alembic/env.py from our pydantic settings,
# so the value here is never read. Left as a placeholder so alembic doesn't
# complain on offline modes.
sqlalchemy.url = driver://user:pass@localhost/dbname

# Path-style version filenames: 0001_initial_schema.py rather than a uuid.
file_template = %%(rev)s_%%(slug)s

# Use UTC for migration timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
