# Local-dev infra: Postgres + Redis. Bring up with `docker compose up -d`.
# Production deployments use the same service definitions but with managed
# Postgres/Redis (see README "Deploying" section).
#
# Host port choices (5433 / 6380) intentionally avoid Linger's defaults
# (5432 / 6379) so both projects can run simultaneously on this machine.
# Inside the container, Postgres still listens on 5432 and Redis on 6379 —
# only the host-exposed mapping is non-default.

services:
  postgres:
    image: postgres:16-alpine
    container_name: vixen-postgres
    environment:
      POSTGRES_USER: vixen
      POSTGRES_PASSWORD: vixen
      POSTGRES_DB: vixen
    ports:
      - "5433:5432"
    volumes:
      - vixen_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vixen -d vixen"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vixen-redis
    ports:
      - "6380:6379"
    volumes:
      - vixen_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vixen_pg_data:
  vixen_redis_data:
